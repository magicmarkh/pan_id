name: AWS Account Vending

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read
  id-token: write # Required for OIDC authentication with AWS
  actions: write # Required to dispatch the Refresh Issue Templates workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse-request:
    if: github.event.label.name == 'provision-aws-account'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.parse.outputs.issueparser_mode }}
      pool_account: ${{ steps.parse.outputs.issueparser_pool_account }}
      account_name: ${{ steps.parse.outputs.issueparser_account_name }}
      account_email: ${{ steps.generate_email.outputs.account_email }}
      requester: ${{ github.event.issue.user.login }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse issue form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/aws-account-request.yml

      - name: Generate account email
        id: generate_email
        run: |
          RANDOM_SUFFIX=$(openssl rand -hex 2)
          ACCOUNT_EMAIL="aws-${{ steps.parse.outputs.issueparser_account_name }}-${RANDOM_SUFFIX}@jdsec.com"
          echo "account_email=$ACCOUNT_EMAIL" >> $GITHUB_OUTPUT
          echo "Generated email: $ACCOUNT_EMAIL"

      - name: Show parsed data
        run: |
          echo "Mode:         ${{ steps.parse.outputs.issueparser_mode }}"
          echo "Pool Account: ${{ steps.parse.outputs.issueparser_pool_account }}"
          echo "Account Name: ${{ steps.parse.outputs.issueparser_account_name }}"
          echo "Requester:    ${{ github.event.issue.user.login }}"

  provision-account:
    needs: parse-request
    runs-on: ubuntu-latest
    environment: production
    outputs:
      account_id: ${{ steps.consolidate_account_id.outputs.account_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }}:role/GitHubActionsOrgProvisioner
          aws-region: us-east-1
          role-session-name: GitHubActions-AccountVending-${{ github.run_id }}

      # ── Simulate mode ────────────────────────────────────────────────────────

      - name: Validate pool account selection (Simulate)
        if: needs.parse-request.outputs.mode == 'Simulate'
        run: |
          SELECTION="${{ needs.parse-request.outputs.pool_account }}"
          if [[ "$SELECTION" == *"Refresh Issue Templates"* || -z "$SELECTION" ]]; then
            echo "❌ No pool account selected. Please run the 'Refresh Issue Templates' workflow"
            echo "   and re-submit after choosing an available account from the dropdown."
            exit 1
          fi
          echo "✅ Pool account selection: $SELECTION"

      - name: Parse selected pool account ID (Simulate)
        if: needs.parse-request.outputs.mode == 'Simulate'
        id: parse_pool_account
        run: |
          # Dropdown format: "Account Name | 123456789012"
          SELECTION="${{ needs.parse-request.outputs.pool_account }}"
          ACCOUNT_ID=$(echo "$SELECTION" | awk -F' | ' '{print $NF}' | tr -d ' ')
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "Parsed account ID: $ACCOUNT_ID"

      - name: Assign pool account (Simulate)
        if: needs.parse-request.outputs.mode == 'Simulate'
        id: assign_account
        run: |
          ACCOUNT_ID="${{ steps.parse_pool_account.outputs.account_id }}"
          ACCOUNT_NAME="${{ needs.parse-request.outputs.account_name }}"
          ACTIVE_OU_ID="${{ secrets.AWS_ACTIVE_OU_ID }}"
          POOL_OU_ID="${{ secrets.AWS_POOL_OU_ID }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Verify account is still available before assigning
          STATUS=$(aws organizations list-tags-for-resource \
            --resource-id "$ACCOUNT_ID" \
            --query "Tags[?Key=='Status'].Value" \
            --output text)

          if [ "$STATUS" != "Available" ]; then
            echo "❌ Account $ACCOUNT_ID is no longer available (status: $STATUS)."
            echo "   Run 'Refresh Issue Templates' and re-submit with an available account."
            exit 1
          fi

          # Move account from pool OU to active OU
          aws organizations move-account \
            --account-id "$ACCOUNT_ID" \
            --source-parent-id "$POOL_OU_ID" \
            --destination-parent-id "$ACTIVE_OU_ID"

          echo "✅ Moved account $ACCOUNT_ID to active OU"

          # Update tags
          aws organizations tag-resource \
            --resource-id "$ACCOUNT_ID" \
            --tags \
              Key=Status,Value=InUse \
              Key=AssignedTo,Value="$ACCOUNT_NAME" \
              Key=AssignedBy,Value="${{ needs.parse-request.outputs.requester }}" \
              Key=AssignedAt,Value="$TIMESTAMP"

          echo "✅ Tagged account as InUse"

          # Update account alias (best-effort)
          ALIAS=$(echo "$ACCOUNT_NAME" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          aws iam create-account-alias --account-alias "lab-${ALIAS}" \
            || aws iam update-account-alias --account-alias "lab-${ALIAS}" \
            || echo "⚠️ Could not update account alias (non-fatal)"

          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "account_alias=lab-${ALIAS}" >> $GITHUB_OUTPUT

      # ── Create mode ──────────────────────────────────────────────────────────

      - name: Check for duplicate account name (Create)
        if: needs.parse-request.outputs.mode == 'Create'
        id: duplicate_check
        run: |
          ACCOUNT_NAME="${{ needs.parse-request.outputs.account_name }}"
          EXISTING=$(aws organizations list-accounts \
            --query "Accounts[?Name=='${ACCOUNT_NAME}'].Id" \
            --output text)

          if [ -n "$EXISTING" ]; then
            echo "❌ An AWS account named '${ACCOUNT_NAME}' already exists (ID: ${EXISTING})"
            exit 1
          fi

          echo "✅ Account name '${ACCOUNT_NAME}' is available"

      - name: Setup Terraform (Create)
        if: needs.parse-request.outputs.mode == 'Create'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init (Create)
        if: needs.parse-request.outputs.mode == 'Create'
        id: init
        working-directory: ./use-cases/aws-account-vending
        run: terraform init

      - name: Terraform Plan (Create)
        if: needs.parse-request.outputs.mode == 'Create'
        id: plan
        working-directory: ./use-cases/aws-account-vending
        env:
          TF_VAR_account_name: ${{ needs.parse-request.outputs.account_name }}
          TF_VAR_account_email: ${{ needs.parse-request.outputs.account_email }}
          TF_VAR_target_ou_id: ${{ secrets.AWS_ACTIVE_OU_ID }}
        run: terraform plan -out=tfplan -no-color

      - name: Comment Plan on Issue (Create)
        if: needs.parse-request.outputs.mode == 'Create'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📋

            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply (Create)
        if: needs.parse-request.outputs.mode == 'Create'
        id: apply
        working-directory: ./use-cases/aws-account-vending
        env:
          TF_VAR_account_name: ${{ needs.parse-request.outputs.account_name }}
          TF_VAR_account_email: ${{ needs.parse-request.outputs.account_email }}
          TF_VAR_target_ou_id: ${{ secrets.AWS_ACTIVE_OU_ID }}
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform account ID (Create)
        if: needs.parse-request.outputs.mode == 'Create'
        id: tf_account_id
        working-directory: ./use-cases/aws-account-vending
        run: |
          ACCOUNT_ID=$(terraform output -raw account_id 2>/dev/null || echo "")
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Consolidate account ID for downstream jobs
        id: consolidate_account_id
        if: success()
        run: |
          MODE="${{ needs.parse-request.outputs.mode }}"
          if [ "$MODE" = "Simulate" ]; then
            ACCOUNT_ID="${{ steps.assign_account.outputs.account_id }}"
          else
            ACCOUNT_ID="${{ steps.tf_account_id.outputs.account_id }}"
          fi
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "Resolved account ID: $ACCOUNT_ID"

      # ── Success / failure comments ────────────────────────────────────────────

      - name: Comment Success on Issue
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const mode      = "${{ needs.parse-request.outputs.mode }}";
            const isSimulate = mode === "Simulate";

            const accountId = isSimulate
              ? "${{ steps.assign_account.outputs.account_id }}"
              : "Account ID available in Terraform outputs";

            const modeNote = isSimulate
              ? "⚡ **Simulated** — recycled from lab pool (fast mode)"
              : "🏗️ **Real account** — provisioned via AWS Organizations";

            const output = `### ✅ AWS Account Provisioned Successfully!

            ${modeNote}

            **Account Details:**
            | Field | Value |
            |---|---|
            | **Account Name** | ${{ needs.parse-request.outputs.account_name }} |
            | **Account ID** | ${accountId} |
            | **Requested By** | @${{ needs.parse-request.outputs.requester }} |
            | **Mode** | ${mode} |

            The account is ready for use.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Comment Failure on Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### ❌ AWS Account Provisioning Failed

            There was an error provisioning the AWS account. Please review the workflow logs and try again.

            **Tip:** If the dropdown showed stale data, run the **Refresh Issue Templates** workflow
            and re-submit with an up-to-date selection.

            [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply-sca-policies:
    needs: [parse-request, provision-account]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init (SCA Policies)
        working-directory: ./use-cases/cyberark-sca-policy
        run: terraform init

      - name: Validate CyberArk tenant reachability
        env:
          SUBDOMAIN: ${{ secrets.CYBERARK_SUBDOMAIN }}
        run: |
          if [ -z "$SUBDOMAIN" ]; then
            echo "❌ CYBERARK_SUBDOMAIN secret is empty"
            exit 1
          fi
          case "$SUBDOMAIN" in
            http://*|https://*|*.*|*" "*|*$'\t'*|*$'\n'*|*$'\r'*)
              echo "❌ CYBERARK_SUBDOMAIN must be just the tenant prefix (e.g. 'abc1234'), no scheme/dots/whitespace"
              exit 1 ;;
          esac

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://platform-discovery.cyberark.cloud/api/v2/services/subdomain/${SUBDOMAIN}")
          echo "Platform discovery HTTP status: $HTTP_CODE"
          case "$HTTP_CODE" in
            200) echo "✅ ISP tenant resolves via platform discovery" ;;
            404)
              echo "❌ 404 — CYBERARK_SUBDOMAIN does not match an ISP tenant subdomain."
              echo "   This must be the ISP tenant *subdomain name* (the prefix of"
              echo "   <subdomain>.cyberark.cloud), not the underlying Identity tenant ID."
              exit 1 ;;
            *)
              echo "⚠️ Unexpected HTTP $HTTP_CODE from platform discovery"
              exit 1 ;;
          esac

      - name: Terraform Apply (SCA Policies)
        id: sca_apply
        working-directory: ./use-cases/cyberark-sca-policy
        env:
          TF_VAR_cyberark_subdomain: ${{ secrets.CYBERARK_SUBDOMAIN }}
          TF_VAR_cyberark_client_id: ${{ secrets.CYBERARK_CLIENT_ID }}
          TF_VAR_cyberark_client_secret: ${{ secrets.CYBERARK_CLIENT_SECRET }}
          TF_VAR_account_id: ${{ needs.provision-account.outputs.account_id }}
          TF_VAR_account_name: ${{ needs.parse-request.outputs.account_name }}
          TF_VAR_org_management_account_id: ${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }}
          TF_VAR_power_user_role_name: ${{ secrets.CYBERARK_POWERUSER_ROLE }}
          TF_VAR_power_user_permission_set_arn: ${{ secrets.SCA_POWER_USER_PERMISSION_SET_ARN }}
          TF_VAR_audit_permission_set_arn: ${{ secrets.SCA_AUDIT_PERMISSION_SET_ARN }}
          TF_VAR_cloudops_permission_set_arn: ${{ secrets.SCA_CLOUDOPS_PERMISSION_SET_ARN }}
          TF_VAR_audit_role_name: ${{ secrets.CYBERARK_AUDITOR_ROLE }}
          TF_VAR_cloudops_role_name: ${{ secrets.CYBERARK_CLOUDOPS_ROLE }}
        run: terraform apply -auto-approve -no-color

      - name: Upload SCA Terraform state
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sca-tfstate-${{ needs.provision-account.outputs.account_id }}
          path: ./use-cases/cyberark-sca-policy/terraform.tfstate
          retention-days: 90
          if-no-files-found: error

      - name: Close issue and comment SCA success
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🔐 CyberArk SCA Policies Applied

              Access policies have been created in CyberArk Identity for account \`${{ needs.provision-account.outputs.account_id }}\`:

              | Policy | Principal |
              |---|---|
              | **PowerUser** | ${{ secrets.CYBERARK_POWERUSER_ROLE }} (role) |
              | **Audit** | ${{ secrets.CYBERARK_AUDITOR_ROLE }} (role) |
              | **CloudOps** | ${{ secrets.CYBERARK_CLOUDOPS_ROLE }} (role) |

              Access is available via CyberArk Secure Cloud Access. Sessions limited to 1 hour, Mon–Fri 08:00–18:00 UTC.`
            });

            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              labels: ['provision-aws-account', 'provisioned']
            });

      - name: Trigger Refresh Issue Templates
        if: success()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'refresh-issue-templates.yml',
              ref: context.ref
            });
            console.log('Triggered Refresh Issue Templates workflow');

      - name: Comment SCA failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ⚠️ CyberArk SCA Policy Creation Failed

              Account provisioning succeeded, but CyberArk Secure Cloud Access policies could not be applied.
              Access to the account will not be available via CyberArk until this is resolved.

              [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });

  apply-sia-infrastructure:
    needs: [parse-request, provision-account]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }}:role/GitHubActionsOrgProvisioner
          aws-region: us-east-1
          role-session-name: GitHubActions-SIAInfra-${{ github.run_id }}

      - name: Wait for child account role to be assumable
        run: |
          ACCOUNT_ID="${{ needs.provision-account.outputs.account_id }}"
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/OrganizationAccountAccessRole"
          for i in 1 2 3 4 5 6; do
            if aws sts assume-role --role-arn "$ROLE_ARN" \
                 --role-session-name probe-${{ github.run_id }} \
                 --duration-seconds 900 >/dev/null 2>&1; then
              echo "✅ OrganizationAccountAccessRole in $ACCOUNT_ID is assumable"
              exit 0
            fi
            echo "⏳ Attempt $i: role not assumable yet, waiting 15s…"
            sleep 15
          done
          echo "❌ Could not assume OrganizationAccountAccessRole in $ACCOUNT_ID after retries"
          exit 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init (SIA Infrastructure)
        working-directory: ./use-cases/aws-sia-infrastructure
        run: terraform init

      - name: Validate CyberArk tenant reachability
        env:
          SUBDOMAIN: ${{ secrets.CYBERARK_SUBDOMAIN }}
        run: |
          if [ -z "$SUBDOMAIN" ]; then
            echo "❌ CYBERARK_SUBDOMAIN secret is empty"
            exit 1
          fi
          case "$SUBDOMAIN" in
            http://*|https://*|*.*|*" "*|*$'\t'*|*$'\n'*|*$'\r'*)
              echo "❌ CYBERARK_SUBDOMAIN must be just the tenant prefix (e.g. 'abc1234'), no scheme/dots/whitespace"
              exit 1 ;;
          esac

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://platform-discovery.cyberark.cloud/api/v2/services/subdomain/${SUBDOMAIN}")
          echo "Platform discovery HTTP status: $HTTP_CODE"
          case "$HTTP_CODE" in
            200) echo "✅ ISP tenant resolves via platform discovery" ;;
            404)
              echo "❌ 404 — CYBERARK_SUBDOMAIN does not match an ISP tenant subdomain."
              exit 1 ;;
            *)
              echo "⚠️ Unexpected HTTP $HTTP_CODE from platform discovery"
              exit 1 ;;
          esac

      - name: Terraform Apply (SIA Infrastructure)
        id: sia_infra_apply
        working-directory: ./use-cases/aws-sia-infrastructure
        env:
          TF_VAR_account_id: ${{ needs.provision-account.outputs.account_id }}
          TF_VAR_account_name: ${{ needs.parse-request.outputs.account_name }}
          TF_VAR_cyberark_subdomain: ${{ secrets.CYBERARK_SUBDOMAIN }}
          TF_VAR_cyberark_client_id: ${{ secrets.CYBERARK_CLIENT_ID }}
          TF_VAR_cyberark_client_secret: ${{ secrets.CYBERARK_CLIENT_SECRET }}
        run: terraform apply -auto-approve -no-color

      - name: Capture SIA infrastructure outputs
        id: sia_outputs
        if: success()
        working-directory: ./use-cases/aws-sia-infrastructure
        run: |
          echo "vpc_id=$(terraform output -raw vpc_id 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "sia_pool_name=$(terraform output -raw sia_pool_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Upload SIA Infrastructure state
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sia-infra-tfstate-${{ needs.provision-account.outputs.account_id }}
          path: ./use-cases/aws-sia-infrastructure/terraform.tfstate
          retention-days: 90
          if-no-files-found: error

      - name: Comment SIA infrastructure success
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🌐 SIA Infrastructure Provisioned

              A cost-free VPC (no NAT gateway) was created in account \`${{ needs.provision-account.outputs.account_id }}\`, and a CyberArk Secure Infrastructure Access policy now scopes access to it:

              | Item | Value |
              |---|---|
              | **VPC** | \`${{ steps.sia_outputs.outputs.vpc_id }}\` |
              | **SIA Pool** | \`${{ steps.sia_outputs.outputs.sia_pool_name }}\` |
              | **Scope** | VPC + private subnet + account \`${{ needs.provision-account.outputs.account_id }}\` |

              No compute was provisioned (no billable resources). Add EC2/SIA connectors during a live demo when needed.`
            });

      - name: Comment SIA infrastructure failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ⚠️ SIA Infrastructure Provisioning Failed

              Account provisioning succeeded, but the VPC and/or CyberArk SIA access policy could not be created.

              [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
