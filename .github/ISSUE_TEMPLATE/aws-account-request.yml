name: AWS Account Request
description: Request a new AWS account to be provisioned
title: '[AWS Account Request]: '
labels:
- aws-account-request
body:
- type: markdown
  attributes:
    value: '## AWS Account Provisioning Request


      **Before submitting:** run the [Refresh Issue Templates](https://github.com/magicmarkh/pan_id/actions/workflows/refresh-issue-templates.yml)

      workflow so the dropdowns below reflect current AWS state.

      '
- type: dropdown
  id: mode
  attributes:
    label: Provisioning Mode
    description: 'Simulate uses a pre-staged lab account (faster, recommended for
      demos). Create provisions a real new AWS account (slower, uses org account quota).

      '
    options:
    - Simulate
    - Create
  validations:
    required: true
- type: dropdown
  id: pool_account
  attributes:
    label: Available Lab Account (Simulate mode only)
    description: 'Select a pool account to assign. Run the "Refresh Issue Templates"
      workflow to populate with current available accounts.

      '
    options:
    - sandbox 1 | 396913732694
  validations:
    required: false
- type: input
  id: account_name
  attributes:
    label: Account Name / Label
    description: 'A label for this account (Simulate) or the AWS account name (Create).
      Alphanumeric and hyphens only.

      '
    placeholder: my-application-prod
  validations:
    required: true
