name: AWS Account Deprovision Request
description: Return a lab account to the pool or deprovision a real account
title: '[Deprovision]: '
labels:
- deprovision-aws-account
body:
- type: markdown
  attributes:
    value: '## AWS Account Deprovisioning Request


      **Before submitting:** run the [Refresh Issue Templates](https://github.com/magicmarkh/pan_id/actions/workflows/refresh-issue-templates.yml)

      workflow so the dropdown below reflects currently active accounts.

      '
- type: dropdown
  id: active_account
  attributes:
    label: Accounts to Deprovision
    multiple: true
    description: 'Select one or more active lab accounts to return to the pool. Run
      the "Refresh Issue Templates" workflow to populate with currently assigned accounts.

      '
    options:
    - sandbox 2 | 841162681454
    - test-2 | 210806259509
    - sandbox 3 | 588738594421
  validations:
    required: true
- type: dropdown
  id: mode
  attributes:
    label: Provisioning Mode Used
    description: Select the mode that was used when this account was provisioned
    options:
    - Simulate
    - Create
  validations:
    required: true
- type: textarea
  id: reason
  attributes:
    label: Reason for Deprovisioning
    placeholder: Demo complete, returning to pool
  validations:
    required: true
